name: Upload data.json to S3

on:
  push:
    paths:
      - "data.json"

  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload to S3
        run: aws s3 cp ./data.json s3://${{ secrets.AWS_BUCKET }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}